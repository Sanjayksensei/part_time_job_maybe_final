<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Part Time Job Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="login-container">
    <!-- Background Shapes -->
    <div class="hero-shapes">
        <div class="hero-shape hero-shape-1"></div>
        <div class="hero-shape hero-shape-2"></div>
    </div>

    <div class="login-card animate-scale-in" style="max-width: 520px;">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2 class="login-title" id="regTitle">Create Account</h2>
            <p class="login-subtitle" id="regSubtitle">Join Part Time Job Finder today</p>
        </div>

        <form onsubmit="register(); return false;">
            <div class="mb-3" id="nameGroup">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" id="regName" class="form-control form-control-premium" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3" id="emailGroup">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" id="regEmail" class="form-control form-control-premium" placeholder="Enter your email" required>
            </div>

            <div class="mb-3" id="phoneGroup">
                <label class="form-label fw-semibold">Phone Number</label>
                <input type="text" id="regPhone" class="form-control form-control-premium" placeholder="e.g. 9876543210">
            </div>

            <div class="mb-3" id="locationGroup">
                <label class="form-label fw-semibold">Location</label>
                <input type="text" id="regLocation" class="form-control form-control-premium" placeholder="e.g. Kochi, Kerala">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">I am a</label>
                <select id="regRole" class="form-select form-select-premium" required onchange="toggleRoleFields()">
                    <option value="employee">Job Seeker (Employee)</option>
                    <option value="employer">Employer / Company</option>
                </select>
            </div>

            <!-- Employer-specific fields -->
            <div id="employerFields" style="display:none;">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Company Name <span class="text-danger">*</span></label>
                    <input type="text" id="regCompanyName" class="form-control form-control-premium" placeholder="e.g. Tech Solutions Inc.">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Company Description</label>
                    <textarea id="regCompanyDesc" class="form-control form-control-premium" rows="2" placeholder="Brief description of your company"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Company Location</label>
                    <input type="text" id="regCompanyLocation" class="form-control form-control-premium" placeholder="e.g. Kochi, Kerala">
                </div>
            </div>

            <!-- Employee-specific fields -->
            <div id="employeeFields" style="display:none;">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Skills (comma-separated)</label>
                    <input type="text" id="regSkills" class="form-control form-control-premium" placeholder="e.g. Communication, Python, React">
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Experience (Years)</label>
                        <input type="number" id="regExperience" class="form-control form-control-premium" min="0" value="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Education</label>
                        <input type="text" id="regEducation" class="form-control form-control-premium" placeholder="e.g. BSc Computer Science">
                    </div>
                </div>
            </div>

            <div class="mb-3" id="passwordGroup">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="regPassword" class="form-control form-control-premium" placeholder="Create a password (min 6 chars)" required minlength="6">
            </div>

            <div class="mb-4" id="confirmPasswordGroup">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input type="password" id="regConfirmPassword" class="form-control form-control-premium" placeholder="Confirm your password" required>
            </div>

            <button type="submit" id="regBtn" class="btn btn-primary w-100 py-3">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <div id="regError" style="display:none; color:#dc3545; background:#fff5f5; border:1px solid #f5c6cb; border-radius:8px; padding:12px 16px; margin-top:16px; text-align:center; font-weight:500; font-size:0.97rem;"></div>

        <div class="text-center mt-4" id="loginLink">
            <p class="text-muted mb-0">Already have an account? 
                <a href="login.html" class="text-primary fw-semibold text-decoration-none">Sign In</a>
            </p>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
// Check if this is an "add role" flow (user already logged in, adding a second role)
const urlParams = new URLSearchParams(window.location.search);
const addRoleMode = urlParams.get('addRole');

function toggleRoleFields() {
    const role = document.getElementById('regRole').value;
    document.getElementById('employerFields').style.display = role === 'employer' ? 'block' : 'none';
    document.getElementById('employeeFields').style.display = role === 'employee' ? 'block' : 'none';
}

if (addRoleMode && ['employee', 'employer'].includes(addRoleMode)) {
    // This is an add-role flow — user is adding a second role to their account
    const token = sessionStorage.getItem('authToken');
    if (!token) {
        // Not logged in, redirect to regular registration
        window.location.href = 'register.html';
    }

    const roleName = addRoleMode === 'employer' ? 'Employer' : 'Job Seeker';

    // Update UI for add-role mode
    document.getElementById('regTitle').textContent = 'Add ' + roleName + ' Role';
    document.getElementById('regSubtitle').textContent = 'Expand your account with a new role';
    document.getElementById('regBtn').innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add ' + roleName + ' Role';

    // Pre-select and lock the role dropdown
    const roleSelect = document.getElementById('regRole');
    roleSelect.value = addRoleMode;
    roleSelect.disabled = true;

    // Hide fields that aren't needed for add-role (name, email, password, etc.)
    document.getElementById('nameGroup').style.display = 'none';
    document.getElementById('emailGroup').style.display = 'none';
    document.getElementById('phoneGroup').style.display = 'none';
    document.getElementById('locationGroup').style.display = 'none';
    document.getElementById('passwordGroup').style.display = 'none';
    document.getElementById('confirmPasswordGroup').style.display = 'none';
    document.getElementById('loginLink').style.display = 'none';

    // Remove required from hidden fields
    document.getElementById('regName').removeAttribute('required');
    document.getElementById('regEmail').removeAttribute('required');
    document.getElementById('regPassword').removeAttribute('required');
    document.getElementById('regConfirmPassword').removeAttribute('required');

    // Show the role-specific profile fields for data collection
    document.getElementById('employerFields').style.display = addRoleMode === 'employer' ? 'block' : 'none';
    document.getElementById('employeeFields').style.display = addRoleMode === 'employee' ? 'block' : 'none';
} else {
    // Normal registration — show employee fields by default (since employee is default selection)
    toggleRoleFields();
}

document.addEventListener('DOMContentLoaded', () => {
    if (typeof setupRealLocationAutocomplete === 'function') {
        setupRealLocationAutocomplete('regLocation');
        setupRealLocationAutocomplete('regCompanyLocation');
    }
});

async function register() {
    const errorDiv = document.getElementById('regError');
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';

    if (addRoleMode && ['employee', 'employer'].includes(addRoleMode)) {
        // Add-role flow: call the add-role API with profile data
        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Adding Role...';

        try {
            // Build the payload with role-specific profile data
            const payload = { role: addRoleMode };

            if (addRoleMode === 'employer') {
                payload.company_name = document.getElementById('regCompanyName').value.trim();
                payload.company_description = document.getElementById('regCompanyDesc').value.trim();
                payload.company_location = document.getElementById('regCompanyLocation').value.trim();

                if (!payload.company_name) {
                    errorDiv.textContent = 'Company name is required';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    const roleName = 'Employer';
                    btn.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add ' + roleName + ' Role';
                    return;
                }
            } else {
                payload.skills = document.getElementById('regSkills').value.trim();
                payload.experience = parseInt(document.getElementById('regExperience').value || 0);
                payload.education = document.getElementById('regEducation').value.trim();
            }

            const data = await apiPost('/auth/add-role', payload);
            // Update sessionStorage with new roles
            sessionStorage.setItem('userRoles', data.roles);
            // Switch to the new role
            const switchData = await apiPost('/auth/switch-role', { role: addRoleMode });
            sessionStorage.setItem('authToken', switchData.token);
            sessionStorage.setItem('userRole', switchData.user.role);
            sessionStorage.setItem('currentView', switchData.user.role);
            sessionStorage.setItem('userRoles', switchData.user.roles || switchData.user.role);
            window.location.href = 'dashboard.html';
        } catch (err) {
            errorDiv.textContent = err.error || err.message || 'Failed to add role. Please try again.';
            errorDiv.style.display = 'block';
            btn.disabled = false;
            const roleName = addRoleMode === 'employer' ? 'Employer' : 'Job Seeker';
            btn.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add ' + roleName + ' Role';
        }
        return;
    }

    // Normal registration flow
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const location = document.getElementById('regLocation').value.trim();
    const role = document.getElementById('regRole').value;
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    const btn = document.getElementById('regBtn');

    if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match!';
        errorDiv.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';

    try {
        // Build payload with role-specific profile data
        const payload = { name, email, password, phone, role, location };

        if (role === 'employer') {
            payload.company_name = document.getElementById('regCompanyName').value.trim() || name;
            payload.company_description = document.getElementById('regCompanyDesc').value.trim();
            payload.company_location = document.getElementById('regCompanyLocation').value.trim() || location;
        } else {
            payload.skills = document.getElementById('regSkills').value.trim();
            payload.experience = parseInt(document.getElementById('regExperience').value || 0);
            payload.education = document.getElementById('regEducation').value.trim();
        }

        const data = await apiPost('/auth/register', payload);
        sessionStorage.setItem('authToken', data.token);
        sessionStorage.setItem('currentView', data.user.role);
        sessionStorage.setItem('userId', data.user.user_id);
        sessionStorage.setItem('userName', data.user.name);
        sessionStorage.setItem('userRole', data.user.role);
        sessionStorage.setItem('userRoles', data.user.roles || data.user.role);
        window.location.href = 'dashboard.html';
    } catch (err) {
        errorDiv.textContent = err.error || err.message || 'Registration failed. Please try again.';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
    }
}
</script>

</body>
</html>
