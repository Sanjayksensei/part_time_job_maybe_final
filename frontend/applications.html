<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications - Part Time Job Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh; position: fixed;">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-briefcase"></i></div>
            <span class="sidebar-brand-text">Job Finder</span>
        </div>
        <hr>
        <ul class="nav flex-column" id="sidebarNav"></ul>
        <div class="nav-item mt-4">
            <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>
    </div>

        <!-- Main Content -->
    <div class="main-content" style="margin-left: 250px; flex: 1;">
        <!-- Mobile Top Bar -->
        <div class="mobile-top-bar">
            <button class="btn-menu" aria-label="Menu" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="mobile-brand"><i class="fas fa-briefcase"></i> Job Finder</div>
            <div class="mobile-user" style="opacity:0"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-overlay" onclick="toggleMobileMenu()" id="sidebarOverlay"></div>
        <div class="role-toggle-header">
            <div class="toggle-container">
                <span class="toggle-label active" id="currentRoleLabel">
                    <i class="fas fa-user-shield"></i> 
                    <span id="currentRoleText">Loading...</span>
                </span>
            </div>
        </div>

        <div class="welcome-section animate-fade-in-up">
            <h2 id="pageTitle">My Applications</h2>
            <p id="pageSubtitle">Track your job applications</p>
        </div>

        <div id="applicationsContainer">
            <div class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x"></i><p class="mt-2">Loading applications...</p></div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/roleManager.js"></script>
<script>
    if (!requireAuth()) { /* redirected */ }

    function getStatusBadge(status) {
        const badges = {
            'pending': '<span class="badge bg-warning text-dark">Pending</span>',
            'accepted': '<span class="badge bg-success">Accepted</span>',
            'rejected': '<span class="badge bg-danger">Rejected</span>',
            'completed': '<span class="badge bg-info">Completed</span>'
        };
        return badges[status] || '<span class="badge bg-secondary">' + status + '</span>';
    }

    async function loadApplications() {
        const container = document.getElementById('applicationsContainer');
        const role = getCurrentRole();

        if (role === 'employer') {
            document.getElementById('pageTitle').textContent = 'Applicants';
            document.getElementById('pageSubtitle').textContent = 'View and manage applicants for your jobs';

            try {
                const { applicants } = await apiGet('/applications/employer/all');
                if (applicants.length === 0) {
                    container.innerHTML = '<div class="text-center py-5"><i class="fas fa-users fa-3x text-muted mb-3"></i><h4>No applicants yet</h4></div>';
                    return;
                }

                container.innerHTML = `<div class="table-responsive">
                    <table class="table table-hover">
                        <thead><tr>
                            <th>Applicant</th><th>Job Title</th><th>Email</th><th>Phone</th><th>Trust Score</th><th>Status</th><th>Actions</th>
                        </tr></thead>
                        <tbody>${applicants.map(a => `
                            <tr>
                                <td><strong>${a.applicant_name}</strong></td>
                                <td>${a.job_title}</td>
                                <td>${a.applicant_email}</td>
                                <td>${a.applicant_phone || 'N/A'}</td>
                                <td><span class="text-warning"><i class="fas fa-star"></i></span> ${a.applicant_trust_score}</td>
                                <td>${getStatusBadge(a.status)}</td>
                                <td>
                                    ${a.status === 'pending' ? `
                                        <button onclick="updateStatus(${a.application_id}, 'accepted', this)" class="btn btn-sm btn-success me-1"><i class="fas fa-check"></i></button>
                                        <button onclick="updateStatus(${a.application_id}, 'rejected', this)" class="btn btn-sm btn-danger"><i class="fas fa-times"></i></button>
                                    ` : '—'}
                                </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>`;
            } catch (err) {
                container.innerHTML = '<p class="text-center text-danger">Failed to load applicants</p>';
            }
        } else {
            document.getElementById('pageTitle').textContent = 'My Applications';
            document.getElementById('pageSubtitle').textContent = 'Track your job applications';

            try {
                const { applications } = await apiGet('/applications/mine');
                if (applications.length === 0) {
                    container.innerHTML = '<div class="text-center py-5"><i class="fas fa-paper-plane fa-3x text-muted mb-3"></i><h4>No applications yet</h4><a href="browse-jobs.html" class="btn btn-primary mt-3">Browse Jobs</a></div>';
                    return;
                }

                container.innerHTML = applications.map((app, i) => `
                    <div class="card shadow-sm border-0 mb-3 animate-fade-in-up delay-${(i % 4) + 1}">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="fw-bold">${app.job_title}</h5>
                                    <p class="text-muted mb-1"><i class="fas fa-building me-2"></i>${app.company_name || app.employer_name}</p>
                                    <p class="text-muted mb-1"><i class="fas fa-map-marker-alt me-2"></i>${app.job_location || 'N/A'}</p>
                                    <p class="text-muted"><i class="fas fa-clock me-2"></i>${app.start_time && app.end_time ? formatTime(app.start_time) + ' - ' + formatTime(app.end_time) : (app.duration || app.job_type)}</p>
                                </div>
                                <div class="text-end">
                                    ${getStatusBadge(app.status)}
                                    <p class="text-muted small mt-2"><i class="fas fa-calendar me-1"></i>${new Date(app.applied_at).toLocaleDateString()}</p>
                                    <p class="fw-bold"><i class="fas fa-indian-rupee-sign"></i> ${app.salary}/day</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = '<p class="text-center text-danger">Failed to load applications</p>';
            }
        }
    }

    async function updateStatus(appId, status, btn) {
        const actionText = status === 'accepted' ? 'accept' : 'reject';
        const confirmed = await confirmAction(`Are you sure you want to ${actionText} this applicant?`);
        if (!confirmed) return;

        btn.disabled = true;
        try {
            await apiPut('/applications/' + appId + '/status', { status });
            showToast('Application ' + status + ' successfully!', 'success');
            loadApplications();
        } catch (err) {
            showToast(err.error || 'Failed to update status', 'error');
            btn.disabled = false;
        }
    }

    // Set role label
    document.addEventListener('DOMContentLoaded', function() {
        const role = getCurrentRole();
        const roleText = document.getElementById('currentRoleText');
        if (roleText) {
            roleText.textContent = role === 'employer' ? 'Employer Mode' : 'Job Seeker Mode';
        }
        loadApplications();
    });
</script>
</body>
</html>
