<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Part Time Job Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh; position: fixed;">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-briefcase"></i></div>
            <span class="sidebar-brand-text">Job Finder</span>
        </div>
        <hr>
        <ul class="nav flex-column" id="sidebarNav"></ul>
        <div class="nav-item mt-4">
            <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>
    </div>

        <!-- Main Content -->
    <div class="main-content" style="margin-left: 250px; flex: 1;">
        <!-- Mobile Top Bar -->
        <div class="mobile-top-bar">
            <button class="btn-menu" aria-label="Menu" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="mobile-brand"><i class="fas fa-briefcase"></i> Job Finder</div>
            <div class="mobile-user" style="opacity:0"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-overlay" onclick="toggleMobileMenu()" id="sidebarOverlay"></div>
        <div class="role-toggle-header">
            <div class="toggle-container">
                <span class="toggle-label active" id="currentRoleLabel">
                    <i class="fas fa-user-shield"></i> 
                    <span id="currentRoleText">Loading...</span>
                </span>
            </div>
        </div>

        <div class="welcome-section animate-fade-in-up">
            <h2>Reviews</h2>
            <p>View your reviews and feedback</p>
        </div>

        <!-- Submit a Review -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-3"><i class="fas fa-pen text-primary me-2"></i>Submit a Review</h4>
                <form onsubmit="submitReview(); return false;">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Reviewee User ID</label>
                            <input type="number" id="revieweeId" class="form-control form-control-premium" placeholder="Enter user ID to review" required min="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Rating (1-5)</label>
                            <select id="reviewRating" class="form-select form-select-premium" required>
                                <option value="">Select rating</option>
                                <option value="5">⭐⭐⭐⭐⭐ (5) Excellent</option>
                                <option value="4">⭐⭐⭐⭐ (4) Good</option>
                                <option value="3">⭐⭐⭐ (3) Average</option>
                                <option value="2">⭐⭐ (2) Below Average</option>
                                <option value="1">⭐ (1) Poor</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Comment</label>
                        <textarea id="reviewComment" class="form-control form-control-premium" rows="3" placeholder="Write your review here..."></textarea>
                    </div>
                    <button type="submit" id="submitReviewBtn" class="btn btn-primary px-4 py-2">
                        <i class="fas fa-paper-plane me-2"></i>Submit Review
                    </button>
                </form>
            </div>
        </div>

        <!-- Reviews Received -->
        <div class="mb-4">
            <h4 class="fw-bold mb-3"><i class="fas fa-inbox text-primary me-2"></i>Reviews Received</h4>
            <div id="receivedReviewsContainer">
                <div class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>

        <!-- Reviews Given -->
        <div class="mb-4">
            <h4 class="fw-bold mb-3"><i class="fas fa-paper-plane text-primary me-2"></i>Reviews Given</h4>
            <div id="givenReviewsContainer">
                <div class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/roleManager.js"></script>
<script>
    if (!requireAuth()) { /* redirected */ }

    function renderStars(rating) {
        return '<i class="fas fa-star text-warning"></i>'.repeat(rating) +
               '<i class="fas fa-star text-muted"></i>'.repeat(5 - rating);
    }

    function renderReviewCard(review, nameField) {
        const name = review[nameField] || 'Unknown';
        const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        const company = review.reviewer_company || review.reviewee_company || '';
        return `
            <div class="card shadow-sm border-0 mb-3">
                <div class="card-body p-4">
                    <div class="d-flex align-items-start gap-3">
                        <div class="company-icon" style="width:50px;height:50px;line-height:50px;font-size:0.9rem;">${initials}</div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h6 class="fw-bold mb-1">${name}</h6>
                                    ${company ? `<small class="text-muted"><i class="fas fa-building me-1"></i>${company}</small>` : ''}
                                </div>
                                <small class="text-muted">${new Date(review.created_at).toLocaleDateString()}</small>
                            </div>
                            <div class="mb-2 mt-1">${renderStars(review.rating)}</div>
                            <p class="mb-0 text-muted">"${review.comment || 'No comment'}"</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    async function loadReviews() {
        // Received reviews
        try {
            const { reviews } = await apiGet('/reviews/received');
            const container = document.getElementById('receivedReviewsContainer');
            if (reviews.length === 0) {
                container.innerHTML = '<p class="text-muted">No reviews received yet</p>';
            } else {
                container.innerHTML = reviews.map(r => renderReviewCard(r, 'reviewer_name')).join('');
            }
        } catch (err) {
            document.getElementById('receivedReviewsContainer').innerHTML = '<p class="text-danger">Failed to load reviews</p>';
        }

        // Given reviews
        try {
            const { reviews } = await apiGet('/reviews/given');
            const container = document.getElementById('givenReviewsContainer');
            if (reviews.length === 0) {
                container.innerHTML = '<p class="text-muted">No reviews given yet</p>';
            } else {
                container.innerHTML = reviews.map(r => renderReviewCard(r, 'reviewee_name')).join('');
            }
        } catch (err) {
            document.getElementById('givenReviewsContainer').innerHTML = '<p class="text-danger">Failed to load reviews</p>';
        }
    }

    async function submitReview() {
        const revieweeId = parseInt(document.getElementById('revieweeId').value);
        const rating = parseInt(document.getElementById('reviewRating').value);
        const comment = document.getElementById('reviewComment').value.trim();
        const btn = document.getElementById('submitReviewBtn');

        if (!revieweeId || !rating) {
            showToast('Please fill in all required fields', 'error');
            return;
        }

        const confirmed = await confirmAction('Are you sure you want to submit this review?');
        if (!confirmed) return;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Submitting...';

        try {
            await apiPost('/reviews', { reviewee_id: revieweeId, rating, comment });
            showToast('Review submitted successfully!', 'success');
            document.getElementById('revieweeId').value = '';
            document.getElementById('reviewRating').value = '';
            document.getElementById('reviewComment').value = '';
            loadReviews();
        } catch (err) {
            showToast(err.error || 'Failed to submit review', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Submit Review';
    }

    document.addEventListener('DOMContentLoaded', loadReviews);
</script>
</body>
</html>
