<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Part Time Job Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh; position: fixed;">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-briefcase"></i></div>
            <span class="sidebar-brand-text">Job Finder</span>
        </div>
        <hr>
        <ul class="nav flex-column" id="sidebarNav"></ul>
        <div class="nav-item mt-4">
            <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>
    </div>

        <!-- Main Content -->
    <div class="main-content" style="margin-left: 250px; flex: 1;">
        <!-- Mobile Top Bar -->
        <div class="mobile-top-bar">
            <button class="btn-menu" aria-label="Menu" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="mobile-brand"><i class="fas fa-briefcase"></i> Job Finder</div>
            <div class="mobile-user" style="opacity:0"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-overlay" onclick="toggleMobileMenu()" id="sidebarOverlay"></div>
        <div class="role-toggle-header">
            <div class="toggle-container">
                <span class="toggle-label active" id="currentRoleLabel">
                    <i class="fas fa-user-shield"></i> 
                    <span id="currentRoleText">Loading...</span>
                </span>
            </div>
        </div>

        <div class="welcome-section animate-fade-in-up">
            <h2>My Profile</h2>
            <p>Manage your profile information</p>
        </div>

        <!-- Job Seeker Profile -->
        <div class="card shadow-sm border-0 mb-4" id="jobSeekerProfile">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-4"><i class="fas fa-user-circle text-primary me-2"></i>Job Seeker Profile</h4>
                <form onsubmit="saveJobSeekerProfile(); return false;">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" class="form-control form-control-premium" id="jsName">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control form-control-premium" id="jsEmail" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text" class="form-control form-control-premium" id="jsPhone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Location</label>
                            <input type="text" class="form-control form-control-premium" id="jsLocation">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Skills (comma-separated)</label>
                            <input type="text" class="form-control form-control-premium" id="jsSkills" placeholder="e.g. Communication, Python">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Availability</label>
                            <select class="form-select form-select-premium" id="jsAvailability">
                                <option value="weekdays">Weekdays</option>
                                <option value="weekends">Weekends</option>
                                <option value="both">Both</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Experience (Years)</label>
                            <input type="number" class="form-control form-control-premium" id="jsExperience" min="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Education</label>
                            <input type="text" class="form-control form-control-premium" id="jsEducation" placeholder="e.g. BSc Computer Science">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary px-4 py-2" id="jsSaveBtn">
                        <i class="fas fa-save me-2"></i>Save Profile
                    </button>
                </form>
            </div>
        </div>

        <!-- Employer Profile -->
        <div class="card shadow-sm border-0 mb-4" id="employerProfile" style="display:none;">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-4"><i class="fas fa-building text-primary me-2"></i>Employer Profile</h4>
                <form onsubmit="saveEmployerProfile(); return false;">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Company Name</label>
                            <input type="text" class="form-control form-control-premium" id="epName">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control form-control-premium" id="epEmail" readonly>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text" class="form-control form-control-premium" id="epPhone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Industry</label>
                            <input type="text" class="form-control form-control-premium" id="epIndustry">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Company Location</label>
                            <input type="text" class="form-control form-control-premium" id="epLocation">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Website</label>
                            <input type="text" class="form-control form-control-premium" id="epWebsite">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Company Description</label>
                        <textarea class="form-control form-control-premium" id="epDescription" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary px-4 py-2" id="epSaveBtn">
                        <i class="fas fa-save me-2"></i>Save Profile
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/roleManager.js"></script>
<script>
    if (!requireAuth()) { /* redirected */ }

    async function loadProfile() {
        const role = getCurrentRole();

        try {
            const { user, profile } = await apiGet('/profile');

            if (role === 'employer') {
                document.getElementById('jobSeekerProfile').style.display = 'none';
                document.getElementById('employerProfile').style.display = 'block';
                document.getElementById('epName').value = profile.company_name || user.name || '';
                document.getElementById('epEmail').value = user.email || '';
                document.getElementById('epPhone').value = user.phone || '';
                document.getElementById('epIndustry').value = profile.industry || '';
                document.getElementById('epLocation').value = profile.company_location || user.location || '';
                document.getElementById('epWebsite').value = profile.website || '';
                document.getElementById('epDescription').value = profile.company_description || '';
            } else {
                document.getElementById('jobSeekerProfile').style.display = 'block';
                document.getElementById('employerProfile').style.display = 'none';
                document.getElementById('jsName').value = user.name || '';
                document.getElementById('jsEmail').value = user.email || '';
                document.getElementById('jsPhone').value = user.phone || '';
                document.getElementById('jsLocation').value = user.location || '';
                document.getElementById('jsSkills').value = profile.skills || '';
                document.getElementById('jsAvailability').value = profile.availability || 'both';
                document.getElementById('jsExperience').value = profile.experience || 0;
                document.getElementById('jsEducation').value = profile.education || '';
            }
        } catch (err) {
            console.error('Load profile error:', err);
            showToast('Failed to load profile', 'error');
        }
    }

    async function saveJobSeekerProfile() {
        const btn = document.getElementById('jsSaveBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';

        try {
            await apiPut('/profile', {
                name: document.getElementById('jsName').value,
                phone: document.getElementById('jsPhone').value,
                location: document.getElementById('jsLocation').value,
                skills: document.getElementById('jsSkills').value,
                availability: document.getElementById('jsAvailability').value,
                experience: parseInt(document.getElementById('jsExperience').value || 0),
                education: document.getElementById('jsEducation').value
            });
            showToast('Profile saved successfully!', 'success');
            sessionStorage.setItem('userName', document.getElementById('jsName').value);
        } catch (err) {
            showToast(err.error || 'Failed to save profile', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Profile';
    }

    async function saveEmployerProfile() {
        const btn = document.getElementById('epSaveBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';

        try {
            await apiPut('/profile/employer', {
                name: document.getElementById('epName').value,
                phone: document.getElementById('epPhone').value,
                location: document.getElementById('epLocation').value,
                company_name: document.getElementById('epName').value,
                company_description: document.getElementById('epDescription').value,
                company_location: document.getElementById('epLocation').value,
                industry: document.getElementById('epIndustry').value,
                website: document.getElementById('epWebsite').value
            });
            showToast('Employer profile saved!', 'success');
            sessionStorage.setItem('userName', document.getElementById('epName').value);
        } catch (err) {
            showToast(err.error || 'Failed to save profile', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Profile';
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadProfile();
        if (typeof setupRealLocationAutocomplete === 'function') {
            setupRealLocationAutocomplete('jsLocation');
            setupRealLocationAutocomplete('epLocation');
        }
    });
</script>
</body>
</html>
