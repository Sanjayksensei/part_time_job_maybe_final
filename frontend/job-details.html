<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - Part Time Job Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh; position: fixed;">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-briefcase"></i></div>
            <span class="sidebar-brand-text">Job Finder</span>
        </div>
        <hr>
        <ul class="nav flex-column" id="sidebarNav"></ul>
        <div class="nav-item mt-4">
            <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>
    </div>

        <!-- Main Content -->
    <div class="main-content" style="margin-left: 250px; flex: 1;">
        <!-- Mobile Top Bar -->
        <div class="mobile-top-bar">
            <button class="btn-menu" aria-label="Menu" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="mobile-brand"><i class="fas fa-briefcase"></i> Job Finder</div>
            <div class="mobile-user" style="opacity:0"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-overlay" onclick="toggleMobileMenu()" id="sidebarOverlay"></div>
        <div class="role-toggle-header">
            <div class="toggle-container">
                <span class="toggle-label active" id="currentRoleLabel">
                    <i class="fas fa-user-shield"></i> 
                    <span id="currentRoleText">Loading...</span>
                </span>
            </div>
        </div>

        <!-- Back button -->
        <div class="mb-3">
            <a href="browse-jobs.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back to Jobs</a>
        </div>

        <div class="row">
            <!-- Main Job Details -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4" id="jobDetailCard">
                    <div class="card-body p-4">
                        <div class="text-center py-5">
                            <i class="fas fa-spinner fa-spin fa-2x"></i>
                            <p class="mt-2">Loading job details...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Company Info Sidebar -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 mb-4" id="companyCard">
                    <div class="card-body p-4">
                        <div class="text-center py-3">
                            <i class="fas fa-spinner fa-spin"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="reportModal">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3><i class="fas fa-flag me-2" style="color: #dc2626;"></i>Report Employer</h3>
            <button class="modal-close" onclick="closeReportModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="report-form-body">
            <div class="form-group">
                <label><i class="fas fa-exclamation-triangle me-1"></i>Reason</label>
                <select id="reportReason">
                    <option value="">Select a reason...</option>
                    <option value="Fraudulent listing">Fraudulent listing</option>
                    <option value="Misleading information">Misleading information</option>
                    <option value="Harassment">Harassment</option>
                    <option value="Unprofessional behavior">Unprofessional behavior</option>
                    <option value="Payment issues">Payment issues</option>
                    <option value="Unsafe work conditions">Unsafe work conditions</option>
                    <option value="Discrimination">Discrimination</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-pen me-1"></i>Description</label>
                <textarea id="reportDescription" rows="4" placeholder="Provide details about your report..."></textarea>
            </div>
        </div>
        <div class="report-form-actions">
            <button class="btn-report-cancel" onclick="closeReportModal()">Cancel</button>
            <button class="btn-report-submit" id="reportSubmitBtn" onclick="submitReport()">
                <i class="fas fa-paper-plane me-1"></i>Submit Report
            </button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/roleManager.js"></script>
<script>
    if (!requireAuth()) { /* redirected */ }

    const urlParams = new URLSearchParams(window.location.search);
    const jobId = urlParams.get('job_id');
    let currentJob = null;

    function getBadgeClass(jobType) {
        const type = (jobType || '').toLowerCase();
        if (type.includes('part')) return 'badge-part-time';
        if (type.includes('temp')) return 'badge-temporary';
        if (type.includes('intern')) return 'badge-internship';
        return 'badge-part-time';
    }

    async function loadJobDetails() {
        if (!jobId) {
            document.getElementById('jobDetailCard').innerHTML = '<div class="card-body p-4 text-center"><h4 class="text-danger">No job ID specified</h4><a href="browse-jobs.html" class="btn btn-primary mt-3">Browse Jobs</a></div>';
            return;
        }

        try {
            const { job } = await apiGet('/jobs/' + jobId);
            currentJob = job;

            const company = job.company_name || job.employer_name || 'Company';
            const initials = company.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
            const role = getCurrentRole();

            document.getElementById('jobDetailCard').innerHTML = `
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <span class="job-type-badge ${getBadgeClass(job.job_type)} mb-2">${job.job_type || 'Part-time'}</span>
                            <h2 class="fw-bold mt-2">${job.title}</h2>
                        </div>
                        <div class="salary-badge fs-5"><i class="fas fa-indian-rupee-sign"></i> ${job.salary}/day</div>
                    </div>
                    
                    <div class="d-flex gap-4 text-muted mb-4">
                        <span><i class="fas fa-map-marker-alt me-1"></i> ${job.location || 'N/A'}</span>
                        <span><i class="fas fa-tag me-1"></i> ${job.category_name || 'General'}</span>
                        ${job.start_time && job.end_time ? `<span><i class="fas fa-clock me-1"></i> ${formatTime(job.start_time)} - ${formatTime(job.end_time)}</span>` : ''}
                    </div>

                    <hr>
                    
                    <h5 class="fw-bold mb-3"><i class="fas fa-file-alt me-2 text-primary"></i>Job Description</h5>
                    <p class="lh-lg mb-4">${job.description}</p>
                    
                    <div class="row mb-4">
                        <div class="col-md-12 mb-3">
                            <h6 class="fw-bold"><i class="fas fa-calendar me-2 text-primary"></i>Job Schedule</h6>
                            <p class="mb-0 fs-6">${job.job_date ? job.job_date : 'Flexible'} ${(job.end_date && job.end_date !== job.job_date) ? ' to ' + job.end_date : ''}</p>
                        </div>
                    </div>

                    ${job.max_workers ? `
                    <div class="mb-4" style="background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem;">
                        <h6 class="fw-bold mb-2"><i class="fas fa-users me-2 text-primary"></i>Workers Required</h6>
                        <div class="d-flex align-items-center gap-3">
                            <div style="flex:1;">
                                <div style="height:10px; background:rgba(99,102,241,0.15); border-radius:20px; overflow:hidden;">
                                    <div style="height:100%; width:${Math.min((job.hired_count / job.max_workers) * 100, 100)}%; background: var(--gradient-primary); border-radius:20px; transition: width 0.5s ease;"></div>
                                </div>
                            </div>
                            <span class="fw-bold" style="white-space:nowrap;">${job.hired_count || 0} / ${job.max_workers} hired</span>
                        </div>
                        ${job.status === 'closed' ? '<p class="text-danger mt-2 mb-0"><i class="fas fa-lock me-1"></i>This job is closed — all positions have been filled.</p>' : ''}
                    </div>
                    ` : ''}

                    ${role === 'employee' ? `
                    <div id="applySection" class="mt-4">
                        ${job.status === 'closed' || (job.max_workers && job.hired_count >= job.max_workers) ? `
                        <button class="btn btn-secondary btn-lg w-100 py-3" disabled>
                            <i class="fas fa-lock me-2"></i>Positions Filled
                        </button>
                        <p class="text-center text-muted mt-2">This job is no longer accepting applications.</p>
                        ` : `
                        <button onclick="applyForJob(${job.job_id})" class="btn btn-primary btn-lg w-100 py-3" id="applyBtn">
                            <i class="fas fa-paper-plane me-2"></i>Apply Now
                        </button>
                        `}
                        <div class="text-center mt-3">
                            <button class="btn-report" onclick="openReportModal()">
                                <i class="fas fa-flag"></i> Report this employer
                            </button>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            document.getElementById('companyCard').innerHTML = `
                <div class="card-body p-4 text-center">
                    <div class="company-icon mx-auto mb-3" style="width:60px; height:60px; font-size:1.3rem; line-height:60px;">${initials}</div>
                    <h5 class="fw-bold">${company}</h5>
                    <p class="text-muted">${job.industry || ''}</p>
                    <hr>
                    <div class="text-start">
                        <p><i class="fas fa-map-marker-alt me-2 text-primary"></i>${job.location || 'N/A'}</p>
                        <p><i class="fas fa-star me-2 text-warning"></i>Trust Score: ${job.employer_trust_score || 'N/A'}</p>
                    </div>
                    ${job.company_description ? `<hr><p class="text-muted small">${job.company_description}</p>` : ''}
                </div>
            `;

        } catch (err) {
            console.error('Load job error:', err);
            document.getElementById('jobDetailCard').innerHTML = '<div class="card-body p-4 text-center"><h4 class="text-danger">Failed to load job details</h4><a href="browse-jobs.html" class="btn btn-primary mt-3">Browse Jobs</a></div>';
        }
    }

    async function applyForJob(jobId) {
        const btn = document.getElementById('applyBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Applying...';

        try {
            await apiPost('/applications', { job_id: jobId });
            btn.innerHTML = '<i class="fas fa-check me-2"></i>Applied Successfully!';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-success');
            showToast('Application submitted successfully!', 'success');
        } catch (err) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Apply Now';
            showToast(err.error || 'Failed to apply', 'error');
        }
    }

    // ─── Report functions ─────────────────────────────────
    function openReportModal() {
        document.getElementById('reportReason').value = '';
        document.getElementById('reportDescription').value = '';
        document.getElementById('reportModal').classList.add('active');
    }

    function closeReportModal() {
        document.getElementById('reportModal').classList.remove('active');
    }

    async function submitReport() {
        const reason = document.getElementById('reportReason').value;
        const description = document.getElementById('reportDescription').value;

        if (!reason) {
            showToast('Please select a reason for the report.', 'error');
            return;
        }

        const confirmed = await confirmAction('Are you sure you want to submit this report?');
        if (!confirmed) return;

        const btn = document.getElementById('reportSubmitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Submitting...';

        try {
            const data = await apiPost('/reports', {
                reported_id: currentJob.employer_id,
                job_id: currentJob.job_id,
                reason,
                description
            });
            showToast(data.message, 'success');
            closeReportModal();
        } catch (err) {
            showToast(err.error || 'Failed to submit report', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane me-1"></i>Submit Report';
    }

    document.addEventListener('DOMContentLoaded', loadJobDetails);
</script>
</body>
</html>
